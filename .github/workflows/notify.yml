name: Jira Notifier

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:           # manual trigger from GitHub UI

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests telethon

      - name: Verify Jira token
        env:
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
        run: |
          python3 -c "
          import os, requests, base64
          token = os.environ['JIRA_TOKEN']
          creds = base64.b64encode(f'codingmanager.ratio@gmail.com:{token}'.encode()).decode()
          headers = {'Authorization': f'Basic {creds}', 'Accept': 'application/json', 'User-Agent': 'Mozilla/5.0'}
          r = requests.get('https://codingmanagerratio.atlassian.net/rest/api/3/myself', headers=headers)
          print(f'Status: {r.status_code}')
          if r.ok: print('Auth OK:', r.json().get('displayName'))
          else: print('FAILED:', r.text[:300])
          "

      - name: Run notifier
        env:
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
        run: python notifier.py

      - name: Save state
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update notifier state"
          file_pattern: state.json
